services:
  deepwiki:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8001}:${PORT:-8001}"  # API port
      - "3000:3000"  # Next.js port
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8001}
      - NODE_ENV=production
      - SERVER_BASE_URL=http://localhost:${PORT:-8001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE_PATH=${LOG_FILE_PATH:-api/logs/application.log}
      # tiktoken encoding cache — defaults to the pre-built image cache.
      # Mount a host directory and set this variable to use an external cache in air-gapped environments.
      - TIKTOKEN_CACHE_DIR=${TIKTOKEN_CACHE_DIR:-/opt/tiktoken_cache}
      # SSL / Git certificate overrides for internal networks with self-signed CAs.
      # Set GIT_SSL_CAINFO to the in-container path of your CA bundle so git trusts it.
      # - GIT_SSL_CAINFO=/certs/ca-bundle.crt
    volumes:
      - ~/.adalflow:/root/.adalflow      # Persist repository and embedding data
      - ./api/logs:/app/api/logs          # Persist log files across container restarts
      # Mount a directory of custom CA certificates (.crt files) for internal HTTPS.
      # The Dockerfile copies *.crt files from CUSTOM_CERT_DIR into the system CA store.
      # Set CUSTOM_CERT_DIR to the in-container path when building, or mount here at runtime:
      # - ./certs:/certs:ro
    # Resource limits for docker-compose up (not Swarm mode)
    mem_limit: 6g
    mem_reservation: 2g
    # Health check configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8001}/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
