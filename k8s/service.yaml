apiVersion: v1
kind: Service
metadata:
  name: deepwiki
  namespace: deepwiki
  labels:
    app.kubernetes.io/name: deepwiki
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: deepwiki
  ports:
    # 前端 Next.js 端口（用户访问入口）
    - name: frontend
      port: 3000
      targetPort: 3000
      protocol: TCP
    # 后端 API 端口（前端调用后端时使用）
    - name: api
      port: 8001
      targetPort: 8001
      protocol: TCP
