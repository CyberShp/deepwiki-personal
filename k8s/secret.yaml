# ⚠️  此文件为模板，不要将真实密钥提交到版本控制！
# 使用前请将 <your-*> 占位符替换为真实值，然后手动执行：
#   kubectl apply -f k8s/secret.yaml
# 或使用 kubectl create secret 命令直接创建（推荐，避免明文写入文件）：
#   kubectl create secret generic deepwiki-secret \
#     --from-literal=OPENAI_API_KEY=sk-... \
#     --from-literal=GOOGLE_API_KEY=AIza... \
#     -n deepwiki
#
# 生产环境建议使用 Vault / Sealed Secrets / External Secrets Operator 管理密钥。
apiVersion: v1
kind: Secret
metadata:
  name: deepwiki-secret
  namespace: deepwiki
  labels:
    app.kubernetes.io/name: deepwiki
type: Opaque
stringData:
  # ── 必填：LLM API 密钥 ────────────────────────────────────────────────────
  # OpenAI API 密钥，或内网 OpenAI 兼容接口的密钥
  OPENAI_API_KEY: "<your-openai-api-key>"
  # Google API 密钥（使用 Gemini 模型时必填，否则可留空）
  GOOGLE_API_KEY: "<your-google-api-key>"

  # ── 可选：内网 OpenAI 兼容 LLM ───────────────────────────────────────────
  # 自定义 LLM 的 API 地址（仅内网部署时填写）
  # OPENAI_BASE_URL: "http://llm.intranet.company.com/v1"
  # CUSTOM_LLM_API_KEY: "<your-custom-llm-key>"
  # CUSTOM_LLM_MODEL: "your-model-name"

  # ── 可选：其他 LLM 提供商 ─────────────────────────────────────────────────
  # OPENROUTER_API_KEY: "<your-openrouter-key>"
  # DASHSCOPE_API_KEY: "<your-dashscope-key>"

  # ── 可选：访问码认证 ─────────────────────────────────────────────────────
  # DEEPWIKI_AUTH_MODE: "True"
  # DEEPWIKI_AUTH_CODE: "<your-access-code>"
