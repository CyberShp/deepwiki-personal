apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 使用方式：kubectl apply -k k8s/
# 注意：请先手动创建 Secret（参见 secret.yaml 注释），再执行 apply。

resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  # ingress.yaml 为可选，确认 IngressClass 后取消注释
  # - ingress.yaml
