apiVersion: v1
kind: ConfigMap
metadata:
  name: deepwiki-config
  namespace: deepwiki
  labels:
    app.kubernetes.io/name: deepwiki
data:
  # API 后端监听端口
  PORT: "8001"
  # Node.js 运行环境
  NODE_ENV: "production"
  # 前端访问后端的基础 URL（同一 Pod 内用 localhost；多 Pod 部署改为 Service 地址）
  SERVER_BASE_URL: "http://localhost:8001"
  # 日志级别
  LOG_LEVEL: "INFO"
  # 日志文件路径（容器内）
  LOG_FILE_PATH: "api/logs/application.log"
  # tiktoken 编码缓存目录（镜像内已预置，离线可用）
  TIKTOKEN_CACHE_DIR: "/opt/tiktoken_cache"
  # adalflow 数据目录（与 PVC 挂载点对应）
  ADALFLOW_HOME: "/root/.adalflow"
  # SSL / 自定义 CA 证书（内网自签名场景）
  # 先创建 ConfigMap: kubectl create configmap ca-certs --from-file=ca-bundle.crt -n deepwiki
  # 再将证书挂载到 /certs/ca-bundle.crt（见 deployment.yaml），然后取消注释下方变量：
  # SSL_CERT_FILE: "/certs/ca-bundle.crt"
  # REQUESTS_CA_BUNDLE: "/certs/ca-bundle.crt"
  # GIT_SSL_CAINFO: "/certs/ca-bundle.crt"
  # NODE_EXTRA_CA_CERTS: "/certs/ca-bundle.crt"
  # CURL_CA_BUNDLE: "/certs/ca-bundle.crt"
